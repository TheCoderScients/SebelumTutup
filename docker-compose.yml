services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sebelumtutup}
      POSTGRES_USER: ${POSTGRES_USER:-sebel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sebel_password}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sebel} -d ${POSTGRES_DB:-sebelumtutup}"]
      interval: 10s
      timeout: 5s
      retries: 8

  app:
    build: .
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: "postgresql://${POSTGRES_USER:-sebel}:${POSTGRES_PASSWORD:-sebel_password}@db:5432/${POSTGRES_DB:-sebelumtutup}?schema=public"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres-data:
